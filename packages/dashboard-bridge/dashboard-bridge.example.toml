# dashboard-bridge.example.toml — copy to ~/.config/dashboard-bridge.toml
# and fill in the values from your dashboard.

[dashboard]
# Your dashboard's public URL
url = "https://market-dashboard-ivory.vercel.app"
# Plaintext bridge token from /dashboard/settings/brokers → Generate token
# (the token is shown once — paste it here, then chmod 600 this file)
token = "mdb_REPLACE_ME"
# Optional: live-quote ingest key for local moomoo live prices.
# When set, the bridge daemon pushes real-time prices from moomoo to
# /api/live-quotes/ingest for held tickers + sync.live_quote_extras below.
# Without it, /dashboard/portfolio P/L will go stale within minutes.
# Get it from your dashboard's Vercel env: LIVE_QUOTE_INGEST_KEY
# live_quote_key = "..."
# Optional: machine ingest key for local post-close breadth refresh.
# Use the same value as Vercel/GitHub BRIEF_INGEST_KEY.
# brief_ingest_key = "..."

[broker]
# Must match a UserBrokerAccount.alias on your dashboard
account_alias = "moomoo Malaysia"
# For diagnostics in the dashboard
type = "MOOMOO_FUTUMY"

[opend]
# Where moomoo OpenD is listening
host = "127.0.0.1"
port = 11111
# Your REAL moomoo margin account id (NOT paper)
# Find it with: python -m bridge dry-run after running `get_accounts.py` once
acc_id = 286260077786655984
# FUTUMY / FUTUSG / FUTUINC / etc.
security_firm = "FUTUMY"
# US / HK / SG
market = "US"

[sync]
# Poll every N seconds. 60 is reasonable for a swing trader.
interval_sec = 60
# Fetch the last N days of fills on each poll. The dashboard dedups by
# brokerFillId so re-pulling is cheap; this just bounds the request size.
fill_lookback_days = 1
# Extra tickers to push live quotes for (in addition to held positions).
# Defaults to the major US index ETFs so the dashboard's market tape always
# has a fresh reference. Add your watchlist if you want live RVOL/price for
# names you don't currently hold.
live_quote_extras = "SPY,QQQ,IWM,DIA,VIX,SMH,XLK,NVDA,CRDO,ARM,MRVL"
# Run /api/breadth/refresh once per US trading day after the close from this
# local daemon. The state file ~/.dashboard-bridge-state.json prevents repeats.
breadth_post_close = true
breadth_post_close_time = "16:33"
breadth_timezone = "America/New_York"

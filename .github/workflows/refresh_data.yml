name: Refresh Market Data & Morning Brief

on:
  schedule:
    # Run Mon–Fri at 8:30 AM ET (12:30 UTC) — before US market open
    - cron: '30 12 * * 1-5'
    
  workflow_dispatch: {}   # allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to git-push the refreshed data back to main
    defaults:
      run:
        working-directory: apps/market_dashboard_backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build market data (snapshot, events, charts)
        run: python scripts/build_data.py --out-dir data

      - name: Generate morning brief
        continue-on-error: true
        run: python scripts/morning_brief.py --out-dir data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Sync data into Next.js public folder
        working-directory: apps/market_dashboard
        run: |
          mkdir -p public/market-dashboard/charts
          cp ../market_dashboard_backend/data/snapshot.json public/market-dashboard/
          cp ../market_dashboard_backend/data/events.json    public/market-dashboard/
          cp ../market_dashboard_backend/data/meta.json      public/market-dashboard/
          cp ../market_dashboard_backend/data/morning_brief.md public/market-dashboard/ 2>/dev/null || true
          cp ../market_dashboard_backend/data/charts/*.png   public/market-dashboard/charts/ 2>/dev/null || true

      - name: Sanitize JSON (replace NaN/Infinity with null)
        working-directory: apps/market_dashboard
        run: |
          python3 -c "
          import re, pathlib
          for p in pathlib.Path('public/market-dashboard').glob('*.json'):
              raw = p.read_text()
              fixed = re.sub(r'\bNaN\b|\bInfinity\b|\b-Infinity\b', 'null', raw)
              if fixed != raw:
                  p.write_text(fixed)
                  print(f'Sanitized {p.name}')
          print('JSON sanitization complete')
          "

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f apps/market_dashboard/public/market-dashboard
          echo "=== Staged changes ==="
          git diff --cached --name-status || true
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore: refresh market data [skip ci]"
            git push
          fi
        working-directory: .

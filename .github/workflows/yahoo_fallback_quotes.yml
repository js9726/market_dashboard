name: Yahoo Fallback Quotes

# Hits the unofficial Yahoo /v7/finance/quote endpoint and POSTs to
# /api/live-quotes/ingest in "fallback" mode. The server skips any symbol
# whose existing row is fresher than 90 s — so this is a no-op while the
# user's local moomoo OpenD daemon is running.
#
# Cadence: every 5 min during US market hours (Mon–Fri 13:00–21:00 UTC).
# That's ~96 invocations/week. GitHub Actions is generous enough; no commit
# churn since this script doesn't write to git.
#
# Minute offset starts at :02 (and steps :07/:12/.../:57) to dodge the GH
# Actions cron throttle at :00/:15/:30/:45. WK-4 in ROADMAP.md.

on:
  schedule:
    - cron: '2-57/5 13-21 * * 1-5'
  workflow_dispatch: {}

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Push Yahoo quotes
        working-directory: apps/market_dashboard_backend
        env:
          VERCEL_INGEST_URL:     ${{ secrets.VERCEL_INGEST_URL }}
          LIVE_QUOTE_INGEST_KEY: ${{ secrets.LIVE_QUOTE_INGEST_KEY }}
        run: python scripts/yahoo_quote_push.py

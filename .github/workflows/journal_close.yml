name: Post-Close Journal (Daily)

# Phase 5 of pre-open CI + journal revamp plan
# (see apps/market_dashboard/docs/PLAN-pre-open-ci-and-journal-revamp.md).
#
# Runs 30 min after US market close every trading day (Mon-Fri, US holidays
# auto-skipped). Owns the post-close journal generation + A-list day-14 rescore.
#
# Pipeline:
#   1. Skip if not a US trading day (pandas_market_calendars)
#   2. day14_rescore.py — walk ACTIVE A-list candidates aged 14 trading
#      sessions and compute MFE/MAE/outcome via yfinance. POST to
#      /api/a-list/<id>/day14 which auto-flips status to HIT_TARGET /
#      STOPPED_OUT / EXPIRED.
#   3. (Future Phase 5b) journal_close skill — for each closed trade today,
#      AI-score via Claude SDK + wiki rules, persist JournalEntry, render
#      chart snapshots.
#
# Cron: 20:30 UTC Mon-Fri = 16:30 ET EDT (= 04:30 MYT next day for Jie).
# Jie is asleep at this hour — that's why the work runs cloud-side using
# the broker-bridge daemon's pre-cached fills (Phase 4) instead of waiting
# for Jie's PC to be online.

on:
  schedule:
    - cron: '30 20 * * 1-5'           # 30 min post-close (16:30 ET EDT)
  workflow_dispatch: {}

concurrency:
  group: market-dashboard-journal-close
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  journal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/market_dashboard_backend

    steps:
      - uses: actions/checkout@v4

      # Wiki submodule for the journaler's trader-style context (deploy key).
      - name: Load wiki deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WIKI_SSH_KEY }}

      - name: Fetch wiki submodule
        continue-on-error: true
        run: |
          git submodule set-url packages/core-skills/wiki-source git@github.com:js9726/trade-analyser_skill.git 2>/dev/null || true
          git submodule update --init --recursive || mkdir -p packages/core-skills/wiki-source/wiki

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install journaler deps
        working-directory: packages/core-skills/morning-brief
        run: npm install --no-audit --no-fund

      # ── Step 0: holiday gate ─────────────────────────────────────────────
      - name: Skip if not a US trading day
        run: python scripts/check_trading_day.py

      # ── Step 1: Day-14 A-list rescore (Phase 5 core) ─────────────────────
      - name: Day-14 A-list MFE/MAE rescore
        if: success()
        continue-on-error: true
        run: python scripts/day14_rescore.py
        env:
          VERCEL_INGEST_URL: ${{ secrets.VERCEL_INGEST_URL }}
          BRIEF_INGEST_KEY:  ${{ secrets.BRIEF_INGEST_KEY }}

      # ── Step 2: Per-trade AI journaling (Phase 5b — the "final end") ────
      # For each trade closed today (and not yet journaled), Claude scores it
      # against the 7-trader rubric + wiki rules and persists a JournalEntry.
      # Reads /api/journal/closed-today, writes /api/journal/entries/ingest.
      - name: AI-journal today's closed trades (Claude SDK)
        if: success()
        continue-on-error: true
        working-directory: packages/core-skills/morning-brief
        run: npm run journal
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # DeepSeek fallback — used automatically if Claude is unavailable
          # (credit balance / rate limit). Honors "Claude AND DeepSeek /
          # any available AI provider" and keeps journaling working when one
          # provider's balance runs out.
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          VERCEL_INGEST_URL: ${{ secrets.VERCEL_INGEST_URL }}
          BRIEF_INGEST_KEY:  ${{ secrets.BRIEF_INGEST_KEY }}
          WIKI_DIR: ${{ github.workspace }}/packages/core-skills/wiki-source/wiki
          # 4-day lookback covers a long weekend; widen for holiday gaps.
          JOURNAL_LOOKBACK_DAYS: "4"

      # ── Step 3: Wiki audit sync — Trade Audits page → today ─────────────
      # Runs sync_to_dashboard.py from the wiki submodule so the Trade Audits
      # page reflects the latest verdicts (was stuck at March).
      - name: Sync wiki audits to dashboard
        if: success()
        continue-on-error: true
        working-directory: packages/core-skills/wiki-source
        run: |
          if [ -f scripts/sync_to_dashboard.py ]; then
            pip install -r scripts/requirements.txt 2>/dev/null || true
            python scripts/sync_to_dashboard.py --post 2>&1 || echo "::warning::wiki audit sync failed (non-fatal)"
          else
            echo "::warning::sync_to_dashboard.py not found in wiki submodule"
          fi
        env:
          VERCEL_INGEST_URL: ${{ secrets.VERCEL_INGEST_URL }}
          BRIEF_INGEST_KEY:  ${{ secrets.BRIEF_INGEST_KEY }}

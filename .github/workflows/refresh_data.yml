name: Refresh Market Data & Morning Brief (Daily)

# WK-1 split — this file is the DAILY HEAVY job. Once per US trading day.
# Runs the full pipeline including the expensive bits (breadth scan of ~5000
# tickers + 4-provider morning brief LLM calls + trader verdict).
#
# Intraday refreshes (the cheap ones — snapshot + TV screener only) live in
# refresh_data_intraday.yml. Together they replace the original 7-ticks-of-
# everything design that cost ~$10/day in LLM and 70+ min of CI compute.
#
# Times use off-peak minutes (:07) to dodge the GH Actions cron throttle at
# :00/:15/:30/:45 (WK-4 in ROADMAP.md).
#
#   13:07            ~30 min pre-market   (09:07 ET EDT)
#
# Total: 1 tick/day, ~5/week. The intraday workflow handles the other 6 ticks.

on:
  schedule:
    - cron: '7 13 * * 1-5'           # ~pre-market   (09:07 ET EDT) — daily heavy
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/market_dashboard_backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Step 1: market data (snapshot, events, charts) ─────────────────────
      - name: Build market data
        run: python scripts/build_data.py --out-dir data

      # ── Step 1b: market breadth (NYSE+Nasdaq composite, sectors, industries)
      - name: Compute market breadth
        continue-on-error: true
        timeout-minutes: 12
        run: python scripts/breadth_scan.py --out-dir data

      # ── Step 1c: TradingView screener hits + DeepSeek auto-score top 10 ───
      # Note: if TradingView blocks this IP (common in CI), the script exits
      # non-zero but does NOT overwrite the output — last good data is preserved.
      - name: Fetch TV screeners
        continue-on-error: true
        run: python scripts/tv_screener_fetch.py --out-dir data --score --score-top 10
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # TV_SESSION_ID: your TradingView sessionid cookie value.
          # Add as a GitHub Secret to bypass IP-based blocks on cloud runners.
          # Get it from Chrome → DevTools → Application → Cookies → tradingview.com → sessionid
          # Refresh every 30-90 days when it expires.
          TV_SESSION_ID: ${{ secrets.TV_SESSION_ID }}

      # ── Step 2: morning brief — all 4 providers, pushed to Postgres ────────
      # The Python script writes HTML files to data/ and (when --post-to is set)
      # POSTs each provider's output to /api/morning-verdict/ingest. Brief
      # generation is non-fatal so a single provider failure doesn't break the
      # build.
      - name: Generate morning brief
        continue-on-error: true
        run: |
          python scripts/morning_brief.py --out-dir data \
            --post-to "${VERCEL_INGEST_URL%/}/api/morning-verdict/ingest" \
            --post-key "$BRIEF_INGEST_KEY" \
            --generated-by cron-premarket
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY:      ${{ secrets.DEEPSEEK_API_KEY }}
          VERCEL_INGEST_URL:     ${{ secrets.VERCEL_INGEST_URL }}
          BRIEF_INGEST_KEY:      ${{ secrets.BRIEF_INGEST_KEY }}

      # ── Step 3: trader verdict JSON (still useful for spotlight fallback) ──
      - name: Generate trader verdict
        continue-on-error: true
        run: python scripts/trader_verdict.py --out-dir data --providers gemini,claude,openai
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}

      # ── Step 4: sync snapshot/charts only (brief now lives in Postgres) ────
      - name: Sync data into Next.js public folder
        working-directory: apps/market_dashboard
        run: |
          mkdir -p public/market-dashboard/charts
          cp ../market_dashboard_backend/data/snapshot.json          public/market-dashboard/
          cp ../market_dashboard_backend/data/events.json             public/market-dashboard/
          cp ../market_dashboard_backend/data/meta.json               public/market-dashboard/
          cp ../market_dashboard_backend/data/trader_verdict.json     public/market-dashboard/ 2>/dev/null || true
          cp ../market_dashboard_backend/data/breadth.json            public/market-dashboard/ 2>/dev/null || true
          cp ../market_dashboard_backend/data/breadth_history.json    public/market-dashboard/ 2>/dev/null || true
          cp ../market_dashboard_backend/data/tv_screeners.json       public/market-dashboard/ 2>/dev/null || true
          cp ../market_dashboard_backend/data/charts/*.png             public/market-dashboard/charts/ 2>/dev/null || true

      # ── Step 5: sanitize JSON (replace NaN/Infinity with null) ────────────
      - name: Sanitize JSON
        working-directory: apps/market_dashboard
        run: |
          python3 -c "
          import re, pathlib
          for p in pathlib.Path('public/market-dashboard').glob('*.json'):
              raw = p.read_text()
              fixed = re.sub(r'\bNaN\b|\bInfinity\b|\b-Infinity\b', 'null', raw)
              if fixed != raw:
                  p.write_text(fixed)
                  print(f'Sanitized {p.name}')
          print('JSON sanitization complete')
          "

      # ── Step 6: commit and push (snapshot/charts only) ─────────────────────
      - name: Commit updated data
        working-directory: .
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f apps/market_dashboard/public/market-dashboard
          echo "=== Staged changes ==="
          git diff --cached --name-status || true
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh market data [skip ci]"
          # Retry on race condition — `refresh_data_intraday.yml` and developer
          # pushes can advance main between our checkout and push, causing
          # "fetch first" rejection. Rebase + retry up to 5x.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed successfully on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt rejected. Rebasing on origin/main..."
            if ! git pull --rebase --autostash origin main; then
              echo "Rebase failed on attempt $attempt; aborting."
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
          done
          echo "Push failed after 5 attempts."
          exit 1

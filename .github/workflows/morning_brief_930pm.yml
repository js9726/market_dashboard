name: Morning Brief — 9:30 PM MYT (market open)

# Runs at 13:30 UTC = 9:30 PM MYT = 9:30 AM ET (US market open), Mon–Fri.
# Uses cli_run.py which:
#   1. Fetches CNN Fear & Greed Index live
#   2. Fetches live yfinance prices for all watchlist tickers
#   3. Reads your saved watchlist from the dashboard DB (/api/watchlist/export)
#   4. Merges today's TV screener top tickers (tv_screeners.json from prior run)
#   5. Calls DeepSeek-V4-Flash + web search (falls back to Gemini) with the combined list
#   6. Pushes the StructuredBrief JSON to /api/morning-verdict/ingest
# Dashboard viewers see the updated brief within 60 seconds.

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 13:30 UTC = 21:30 MYT = 09:30 ET
  workflow_dispatch:
    inputs:
      provider:
        description: 'AI provider (deepseek-search | deepseek | gemini | openai | claude)'
        required: false
        default: 'deepseek-search'
      watchlist:
        description: 'Override watchlist (comma-separated tickers, blank = use DB)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  brief:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core-skills/morning-brief

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # cli_run.py uses only stdlib + optional yfinance for live price pre-fetch
      - name: Install Python dependencies
        run: pip install yfinance

      # ── Primary run: DeepSeek-V4-Flash + web search (live-data grounded) ────
      - name: Generate + push morning brief (DeepSeek search)
        id: deepseek_search
        continue-on-error: true
        run: |
          PROVIDER="${{ github.event.inputs.provider || 'deepseek-search' }}"
          EXTRA_FLAGS=""
          if [ -n "${{ github.event.inputs.watchlist }}" ]; then
            EXTRA_FLAGS="--watchlist ${{ github.event.inputs.watchlist }}"
          fi
          python cli_run.py --provider "$PROVIDER" --post $EXTRA_FLAGS
        env:
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VERCEL_INGEST_URL: ${{ secrets.VERCEL_INGEST_URL }}
          BRIEF_INGEST_KEY:  ${{ secrets.BRIEF_INGEST_KEY }}

      # ── Fallback: Gemini if DeepSeek search failed ───────────────────────────
      - name: Fallback — Gemini brief
        if: steps.deepseek_search.outcome == 'failure'
        run: python cli_run.py --provider gemini --post
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          VERCEL_INGEST_URL: ${{ secrets.VERCEL_INGEST_URL }}
          BRIEF_INGEST_KEY:  ${{ secrets.BRIEF_INGEST_KEY }}

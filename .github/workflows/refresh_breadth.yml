name: Refresh Breadth (Open + Close)

# Dedicated 2x-daily breadth scan — runs at US market OPEN (9:37 ET) and
# POST-CLOSE (16:37 ET). The main refresh_data.yml only runs once pre-market;
# the intraday workflow explicitly skips breadth for cost reasons.
#
# This workflow exists because the Market Breadth panel on the Conviction Desk
# was showing pre-open data hours into the trading session — the panel needs
# at least 2 refreshes per day (intraday read + post-close snapshot) to stay
# meaningful for active traders.
#
# breadth_scan.py walks the full NYSE + Nasdaq composite (~5000 tickers) and
# computes new highs/lows, advance/decline, stage analysis, sector %above-50SMA.
# Runtime: 5-12 min. Output: breadth.json + breadth_history.json.

on:
  schedule:
    # ET EDT (UTC-4) — May through early November.
    # Use :43 to stay off-peak and avoid colliding with refresh_data_intraday.yml at :33.
    - cron: '43 13 * * 1-5'   # 13 min after market open    (09:43 ET EDT)
    - cron: '43 20 * * 1-5'   # 43 min after post-close     (16:43 ET EDT)
  workflow_dispatch: {}

concurrency:
  group: market-dashboard-refresh-breadth
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  breadth:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/market_dashboard_backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Step 1: full-universe breadth scan ───────────────────────────────────
      - name: Compute market breadth
        continue-on-error: true
        timeout-minutes: 15
        run: python scripts/breadth_scan.py --out-dir data

      # ── Step 2: sync breadth data into Next.js public folder ────────────────
      - name: Sync breadth into public folder
        working-directory: apps/market_dashboard
        run: |
          mkdir -p public/market-dashboard
          cp ../market_dashboard_backend/data/breadth.json          public/market-dashboard/ 2>/dev/null || true
          cp ../market_dashboard_backend/data/breadth_history.json  public/market-dashboard/ 2>/dev/null || true

      # ── Step 3: sanitize JSON (replace NaN/Infinity with null) ──────────────
      - name: Sanitize JSON
        working-directory: apps/market_dashboard
        run: |
          python3 -c "
          import re, pathlib
          for p in pathlib.Path('public/market-dashboard').glob('breadth*.json'):
              raw = p.read_text()
              fixed = re.sub(r'\bNaN\b|\bInfinity\b|\b-Infinity\b', 'null', raw)
              if fixed != raw:
                  p.write_text(fixed)
                  print(f'Sanitized {p.name}')
          print('JSON sanitization complete')
          "

      # ── Step 4: commit and push (breadth only) ───────────────────────────────
      - name: Commit updated breadth
        working-directory: .
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f apps/market_dashboard_backend/data/breadth.json \
                     apps/market_dashboard_backend/data/breadth_history.json \
                     apps/market_dashboard/public/market-dashboard/breadth.json \
                     apps/market_dashboard/public/market-dashboard/breadth_history.json
          echo "=== Staged changes ==="
          git diff --cached --name-status || true
          if git diff --cached --quiet; then
            echo "No breadth changes — nothing to commit."
            exit 0
          fi
          # Tag commit message with which run this was (open vs close) for audit
          HOUR_UTC=$(date -u +%H)
          if [ "$HOUR_UTC" = "13" ]; then
            TAG="open-snapshot"
          elif [ "$HOUR_UTC" = "20" ]; then
            TAG="close-snapshot"
          else
            TAG="manual"
          fi
          git commit -m "chore: refresh breadth ($TAG) [skip ci]"
          # Retry on race condition with refresh_data_intraday.yml — same -X theirs
          # strategy as refresh_data.yml so data-file conflicts always resolve in favour
          # of the more recent run.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed successfully on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt rejected. Rebasing on origin/main..."
            if ! git pull --rebase --autostash -X theirs origin main; then
              echo "Rebase failed on attempt $attempt; aborting."
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
          done
          echo "Push failed after 5 attempts."
          exit 1
